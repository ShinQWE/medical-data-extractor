<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedExtractor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .card h2 {
            color: #444;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .form-group input[type="file"] {
            padding: 8px;
            background: #f9f9f9;
        }
        
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button.small {
            padding: 8px 12px;
            font-size: 14px;
            width: auto;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: #4CAF50;
            transition: width 0.3s;
        }
        
        .status {
            text-align: center;
            color: #666;
            margin: 10px 0;
        }
        
        .columns-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .column-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .column-item:last-child {
            border-bottom: none;
        }
        
        .column-name {
            font-weight: bold;
            color: #333;
        }
        
        .column-desc {
            color: #999;
            font-size: 12px;
            margin-top: 3px;
        }
        
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }
        
        .flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .text-center {
            text-align: center;
        }
        
        .info {
            color: #2196F3;
            background: #E3F2FD;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> MedExtractor</h1>

        <!-- Загрузка файла -->
        <div class="card">
            <h2>Загрузить файл</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label> Файл (Excel/CSV):</label>
                    <input type="file" id="file" accept=".xlsx,.xls,.csv" required>
                </div>

                <div class="form-group">
                    <label> Колонка с ID:</label>
                    <input type="text" id="idCol" value="PersonID_Ref">
                </div>

                <div class="form-group">
                    <label> Колонка с текстом:</label>
                    <input type="text" id="textCol" value="PropertyValue">
                </div>

                <!-- НОВОЕ ПОЛЕ! -->
                <div class="form-group">
                    <label> Описание предметной области (для LLM):</label>
                    <textarea id="domainDesc" placeholder="Например: Медицинские карты пациентов с онкологическими заболеваниями, кардиология, педиатрия...">Медицинские карты пациентов</textarea>
                    <div class="info">Заполните, чтобы LLM сама определила нужные колонки</div>
                </div>

                <button type="submit">Начать обработку</button>
            </form>
        </div>

        <!-- Прогресс -->
        <div class="card" id="progressCard" style="display: none;">
            <h2>Обработка</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status" id="statusText">Загрузка...</div>
            <div class="text-center" id="downloadSection" style="display: none;">
                <a href="#" id="downloadLink" style="display: inline-block; background: #4CAF50; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 10px;">📥 Скачать результат</a>
            </div>
            <div id="errorMessage" class="error"></div>
        </div>

        <!-- База знаний -->
        <div class="card">
            <div class="flex">
                <h2> База знаний</h2>
                <button class="small" onclick="loadColumns()">🔄</button>
            </div>
            <div id="columnsList" class="columns-list">
                <div class="text-center" style="color: #999; padding: 20px;">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        let currentTask = null;
        let checkInterval = null;

        // Загрузка файла
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();

            const file = document.getElementById('file').files[0];
            if (!file) {
                alert('Выберите файл');
                return;
            }

            // Показываем прогресс
            document.getElementById('progressCard').style.display = 'block';
            document.getElementById('downloadSection').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('statusText').innerText = 'Загрузка...';
            document.getElementById('progressFill').style.width = '0%';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('id_col', document.getElementById('idCol').value);
            formData.append('text_col', document.getElementById('textCol').value);
            formData.append('max_cols', '15');
            formData.append('domain_desc', document.getElementById('domainDesc').value); // Новое поле

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                currentTask = data.task_id;

                // Начинаем проверять статус
                if (checkInterval) clearInterval(checkInterval);
                checkInterval = setInterval(checkStatus, 1000);

            } catch (error) {
                showError('Ошибка загрузки');
            }
        };

        // Проверка статуса
        async function checkStatus() {
            if (!currentTask) return;

            try {
                const response = await fetch(`/status/${currentTask}`);
                const status = await response.json();

                document.getElementById('progressFill').style.width = (status.progress * 100) + '%';
                document.getElementById('statusText').innerText =
                    status.status === 'processing' ? 'Обработка...' :
                    status.status === 'completed' ? 'Готово!' :
                    status.status === 'failed' ? 'Ошибка' : status.status;

                if (status.status === 'completed') {
                    clearInterval(checkInterval);
                    document.getElementById('downloadSection').style.display = 'block';
                    document.getElementById('downloadLink').href = `/download/${currentTask}`;
                    loadColumns(); // Обновляем базу знаний
                }

                if (status.status === 'failed') {
                    clearInterval(checkInterval);
                    showError(status.error || 'Ошибка обработки');
                }

            } catch (error) {
                console.error('Status check error:', error);
            }
        }

        // Загрузка колонок из базы знаний
        async function loadColumns() {
            const listEl = document.getElementById('columnsList');
            listEl.innerHTML = '<div class="text-center" style="color: #999; padding: 20px;">Загрузка...</div>';

            try {
                const response = await fetch('/columns');
                const data = await response.json();

                if (data.columns && data.columns.length > 0) {
                    listEl.innerHTML = data.columns.map(col => `
                        <div class="column-item">
                            <div class="column-name">${col.name}</div>
                            <div class="column-desc">${col.description || ''}</div>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = '<div class="text-center" style="color: #999; padding: 20px;">Нет данных</div>';
                }
            } catch (error) {
                listEl.innerHTML = '<div class="text-center" style="color: #d32f2f; padding: 20px;">Ошибка загрузки</div>';
            }
        }

        function showError(msg) {
            document.getElementById('errorMessage').innerText = msg;
            document.getElementById('errorMessage').style.display = 'block';
        }

        // Загружаем колонки при старте
        loadColumns();
    </script>
</body>
</html>
